<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Main sphere -->
  <circle cx="50" cy="50" r="48" fill="#6b6b7a" />
  <!-- Lighter upper hemisphere -->
  <ellipse cx="50" cy="36" rx="40" ry="30" fill="#8e8e9e" opacity="0.5" />
  <!-- Equatorial trench -->
  <rect x="2" y="47" width="96" height="6" fill="#3a3a47" />
  <!-- Superlaser dish recess -->
  <circle cx="31" cy="34" r="14" fill="#4a4a58" />
  <!-- Dish rings -->
  <circle cx="31" cy="34" r="10" fill="none" stroke="#3a3a47" stroke-width="2" />
  <circle cx="31" cy="34" r="6" fill="none" stroke="#3a3a47" stroke-width="2" />
  <!-- Dish center -->
  <circle cx="31" cy="34" r="3" fill="#9090a0" />
  <!-- Sphere outline for crispness -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="#2a2a35" stroke-width="2" />
</svg>
